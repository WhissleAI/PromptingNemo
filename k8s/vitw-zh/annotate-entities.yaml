apiVersion: batch/v1
kind: Job
metadata:
  name: annotate-vitw-zh-entities
  namespace: dataprep
spec:
  activeDeadlineSeconds: 604800
  backoffLimit: 2
  template:
    spec:
      containers:
      - name: annotate
        image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:gpu
        command: ["bash", "-c"]
        args:
        - |
          set -e
          echo "=== Entity annotation for Voices-in-the-Wild ZH ==="

          pip install -q google-generativeai

          TRAIN="/mnt/nfs/data/vitw_zh/train.json"
          VALID="/mnt/nfs/data/vitw_zh/valid.json"

          echo "  train: $(wc -l < "$TRAIN") entries"
          echo "  valid: $(wc -l < "$VALID") entries"

          cat > /tmp/annotate_entities.py << 'PYSCRIPT'
          import os
          import json
          import re
          import time
          import google.generativeai as genai

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          MODEL = genai.GenerativeModel("gemini-2.5-flash")

          def remove_existing_tags(text):
              preserved_tags = {
                  r'GENDER_[A-Z]+': lambda m: m.group(0),
                  r'EMOTION_[A-Z]+': lambda m: m.group(0),
                  r'AGE_[0-9_A-Z]+': lambda m: m.group(0),
                  r'INTENT_[A-Z]+': lambda m: m.group(0),
                  r'SPEAKER_CHANGE': lambda m: m.group(0),
              }
              preserved_text = text
              for pattern, replacement in preserved_tags.items():
                  preserved_text = re.sub(pattern, replacement, preserved_text)
              cleaned_text = re.sub(r'(?:NER|ENTITY)_\w+\s?', '', preserved_text)
              cleaned_text = re.sub(r'\s?END', '', cleaned_text)
              return cleaned_text

          def fix_end_tags(text):
              if not isinstance(text, str):
                  return text
              text = re.sub(r'(\w)END', r'\1 END', text)
              text = re.sub(r'(ENTITY_[A-Z0-9_]+)(\S)', r'\1 \2', text)
              pattern = r'(ENTITY_[A-Z0-9_]+\s+[^\s.,?!]+)(?!\s+END)'
              text = re.sub(pattern, r'\1 END', text)
              return text

          def annotate_sentences(sentences):
              prompt = f'''
          You are given a list of sentences that may contain existing tags like GENDER_FEMALE, EMOTION_NEUTRAL, AGE_45_60, INTENT_INFORM, and SPEAKER_CHANGE.

          Your task is to:
          1. Remove any legacy entity tags such as NER_PERSON, NER_NORP, etc.
          2. Preserve these existing tags exactly as they appear: GENDER_*, EMOTION_*, AGE_*, INTENT_*, SPEAKER_CHANGE.
          3. **ONLY annotate entities from the following list.** Do NOT invent new entity types.
          4. Insert entity tags in the format ENTITY_<TYPE> before each entity and append " END" (with a space) after it.
          5. Return the output as a JSON array of annotated sentences.

          IMPORTANT:
          - Do NOT modify or remove existing GENDER, EMOTION, AGE, INTENT, or SPEAKER_CHANGE tags.
          - Every entity annotation must be in the form "ENTITY_<TYPE> entity_text END" (notice the space before END).
          - If no entities are found, return the sentence unchanged.

          Entities to annotate (ONLY USE THESE ENTITY TYPES):
          [
              "PERSON_NAME", "ORGANIZATION", "LOCATION", "ADDRESS", "CITY", "STATE", "COUNTRY", "ZIP_CODE", "CURRENCY", "PRICE",
              "DATE", "TIME", "DURATION", "APPOINTMENT_DATE", "APPOINTMENT_TIME", "DEADLINE", "DELIVERY_DATE", "DELIVERY_TIME",
              "EVENT", "MEETING", "TASK", "PROJECT_NAME", "ACTION_ITEM", "PRIORITY", "FEEDBACK", "REVIEW", "RATING", "COMPLAINT",
              "QUESTION", "RESPONSE", "NOTIFICATION_TYPE", "AGENDA", "REMINDER", "NOTE", "RECORD", "ANNOUNCEMENT", "UPDATE",
              "SCHEDULE", "BOOKING_REFERENCE", "APPOINTMENT_NUMBER", "ORDER_NUMBER", "INVOICE_NUMBER", "PAYMENT_METHOD",
              "PAYMENT_AMOUNT", "BANK_NAME", "ACCOUNT_NUMBER", "CREDIT_CARD_NUMBER", "TAX_ID", "SOCIAL_SECURITY_NUMBER",
              "DRIVER'S_LICENSE", "PASSPORT_NUMBER", "INSURANCE_PROVIDER", "POLICY_NUMBER", "INSURANCE_PLAN", "CLAIM_NUMBER",
              "POLICY_HOLDER", "BENEFICIARY", "RELATIONSHIP", "EMERGENCY_CONTACT", "PROJECT_PHASE", "VERSION", "DEVELOPMENT_STAGE",
              "DEVICE_NAME", "OPERATING_SYSTEM", "SOFTWARE_VERSION", "BRAND", "MODEL_NUMBER", "LICENSE_PLATE", "VEHICLE_MAKE",
              "VEHICLE_MODEL", "VEHICLE_TYPE", "FLIGHT_NUMBER", "HOTEL_NAME", "ROOM_NUMBER", "TRANSACTION_ID", "TICKET_NUMBER",
              "SEAT_NUMBER", "GATE", "TERMINAL", "TRANSACTION_TYPE", "PAYMENT_STATUS", "PAYMENT_REFERENCE", "INVOICE_STATUS",
              "SYMPTOM", "DIAGNOSIS", "MEDICATION", "DOSAGE", "ALLERGY", "PRESCRIPTION", "TEST_NAME", "TEST_RESULT", "MEDICAL_RECORD",
              "HEALTH_STATUS", "HEALTH_METRIC", "VITAL_SIGN", "DOCTOR_NAME", "HOSPITAL_NAME", "DEPARTMENT", "WARD", "CLINIC_NAME",
              "WEBSITE", "URL", "IP_ADDRESS", "MAC_ADDRESS", "USERNAME", "PASSWORD", "LANGUAGE", "CODE_SNIPPET", "DATABASE_NAME",
              "API_KEY", "WEB_TOKEN", "URL_PARAMETER", "SERVER_NAME", "ENDPOINT", "DOMAIN",
              "PRODUCT", "SERVICE", "CATEGORY", "BRAND", "ORDER_STATUS", "DELIVERY_METHOD", "RETURN_STATUS", "WARRANTY_PERIOD",
              "CANCELLATION_REASON", "REFUND_AMOUNT", "EXCHANGE_ITEM", "GIFT_OPTION", "GIFT_MESSAGE",
              "FOOD_ITEM", "DRINK_ITEM", "CUISINE", "MENU_ITEM", "ORDER_NUMBER", "DELIVERY_ESTIMATE", "RECIPE", "INGREDIENT",
              "DISH_NAME", "PORTION_SIZE", "COOKING_TIME", "PREPARATION_METHOD",
              "NATIONALITY", "RELIGION", "MARITAL_STATUS", "OCCUPATION", "EDUCATION_LEVEL", "DEGREE",
              "SKILL", "EXPERIENCE", "YEARS_OF_EXPERIENCE", "CERTIFICATION",
              "MEASUREMENT", "DISTANCE", "WEIGHT", "HEIGHT", "VOLUME", "TEMPERATURE", "SPEED", "CAPACITY", "DIMENSION", "AREA",
              "SHAPE", "COLOR", "MATERIAL", "TEXTURE", "PATTERN", "STYLE",
              "WEATHER_CONDITION", "TEMPERATURE_SETTING", "HUMIDITY_LEVEL", "WIND_SPEED", "RAIN_INTENSITY", "AIR_QUALITY",
              "POLLUTION_LEVEL", "UV_INDEX",
              "QUESTION_TYPE", "REQUEST_TYPE", "SUGGESTION_TYPE", "ALERT_TYPE", "REMINDER_TYPE", "STATUS", "ACTION", "COMMAND"
          ]

          Example:
          Input: "我有15个苹果，我的朋友大卫给了我20个。 AGE_45_60 GENDER_MALE EMOTION_NEUTRAL INTENT_INFORM"
          Output: "我有 ENTITY_NUMBER 15 END 个苹果，我的朋友 ENTITY_PERSON_NAME 大卫 END 给了我 ENTITY_NUMBER 20 END 个。 AGE_45_60 GENDER_MALE EMOTION_NEUTRAL INTENT_INFORM"

          Sentences to Annotate:
          {json.dumps(sentences, ensure_ascii=False)}
          '''

              for attempt in range(5):
                  try:
                      response = MODEL.generate_content(prompt)
                      assistant_reply = response.text.strip()

                      if assistant_reply.startswith("```"):
                          lines = assistant_reply.splitlines()
                          if lines[0].startswith("```"):
                              lines = lines[1:]
                          if lines and lines[-1].startswith("```"):
                              lines = lines[:-1]
                          assistant_reply = "\n".join(lines).strip()

                      annotated_sentences = json.loads(assistant_reply)
                      if isinstance(annotated_sentences, list) and len(annotated_sentences) == len(sentences):
                          return [fix_end_tags(s) if isinstance(s, str) else s for s in annotated_sentences]
                      else:
                          print(f"Gemini returned {len(annotated_sentences) if isinstance(annotated_sentences, list) else 'non-list'}, expected {len(sentences)}")
                          return sentences
                  except json.JSONDecodeError as e:
                      print(f"JSON decode error (attempt {attempt+1}): {e}")
                      if attempt < 4:
                          time.sleep(2 ** (attempt + 1))
                      else:
                          return sentences
                  except Exception as e:
                      wait = min(2 ** (attempt + 1) * 2, 60)
                      print(f"Gemini API error (attempt {attempt+1}): {e}, retrying in {wait}s")
                      time.sleep(wait)
              return sentences

          def process_jsonl_file(input_path, output_path, batch_size=10, max_workers=20):
              from concurrent.futures import ThreadPoolExecutor, as_completed
              import threading

              os.makedirs(os.path.dirname(output_path) or '.', exist_ok=True)
              if os.path.exists(output_path):
                  os.remove(output_path)

              with open(input_path, 'r', encoding='utf-8') as f:
                  records = [json.loads(line) for line in f]

              total_records = len(records)
              total_batches = (total_records + batch_size - 1) // batch_size
              print(f"Total records: {total_records}, batches: {total_batches}, workers: {max_workers}")

              all_batches = []
              for batch_start in range(0, total_records, batch_size):
                  batch_records = records[batch_start:batch_start + batch_size]
                  original_texts = []
                  for record in batch_records:
                      text_content = record.get('text')
                      if isinstance(text_content, dict) and 'sentence' in text_content:
                          original_texts.append(remove_existing_tags(text_content['sentence']))
                      elif isinstance(text_content, dict) and 'text' in text_content:
                          original_texts.append(remove_existing_tags(text_content['text']))
                      elif isinstance(text_content, str):
                          original_texts.append(remove_existing_tags(text_content))
                      else:
                          original_texts.append("")
                  all_batches.append((batch_start, batch_records, original_texts))

              results = [None] * len(all_batches)
              lock = threading.Lock()
              completed = [0]

              def process_batch(batch_idx):
                  batch_start, batch_records, original_texts = all_batches[batch_idx]
                  annotated_texts = annotate_sentences(original_texts)
                  for record, annotated_text in zip(batch_records, annotated_texts):
                      record['text'] = annotated_text
                  results[batch_idx] = batch_records
                  with lock:
                      completed[0] += len(batch_records)
                      if completed[0] % 5000 < batch_size:
                          print(f"  Progress: {completed[0]}/{total_records} ({completed[0]*100//total_records}%)")

              with ThreadPoolExecutor(max_workers=max_workers) as executor:
                  futures = {executor.submit(process_batch, i): i for i in range(len(all_batches))}
                  for future in as_completed(futures):
                      try:
                          future.result()
                      except Exception as e:
                          print(f"Batch {futures[future]} failed: {e}")

              with open(output_path, 'w', encoding='utf-8') as f:
                  for batch_records in results:
                      if batch_records:
                          for record in batch_records:
                              f.write(json.dumps(record, ensure_ascii=False) + '\n')

              print(f"Processing complete. {total_records} records → {output_path}")

          if __name__ == "__main__":
              import sys
              input_path = sys.argv[1]
              output_path = sys.argv[2]
              batch_size = int(sys.argv[3]) if len(sys.argv) > 3 else 10
              max_workers = int(sys.argv[4]) if len(sys.argv) > 4 else 20
              process_jsonl_file(input_path, output_path, batch_size, max_workers)
          PYSCRIPT

          cp "$TRAIN" "${TRAIN}.pre_entity.bak"
          cp "$VALID" "${VALID}.pre_entity.bak"

          python /tmp/annotate_entities.py "$TRAIN" "${TRAIN}.tmp" 30 20
          mv "${TRAIN}.tmp" "$TRAIN"

          python /tmp/annotate_entities.py "$VALID" "${VALID}.tmp" 30 20
          mv "${VALID}.tmp" "$VALID"

          echo "=== Entity annotation done ==="
          head -2 "$TRAIN"
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-key
              key: key
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "8"
            memory: 16Gi
        volumeMounts:
        - name: nfs-data
          mountPath: /mnt/nfs
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      volumes:
      - name: nfs-data
        persistentVolumeClaim:
          claimName: nfs-training-pvc
