model:
  model_root: /mnt/nfs/models/stt_meta_1b/
  model_name: parakeet-600m-encoder-tune-weight-0.5-batch-langfamily-balance-tokenizer-aggregated-new.nemo
  tokenizer_folder: tokenizer
  new_tokenizer_folder: gujlish_meta_tokenizer
  use_aggregate_tokenizer: true
  dynamic_tokenizer_params:
    type: bpe
    dir_prefix: tokenizer_
    non_special_tokens_per_lang: 3000
    non_special_tokens_per_lang_overrides: {}
    character_coverage: 0.995
    character_coverage_overrides: {}
    tokenizer_options: null
  special_token_prefixes:
  - ENTITY_
  - INTENT_
  - EMOTION_
  - GENDER_
  - AGE_
  language_families:
  - INDO_ARYAN
  - ENGLISH
  tokenizer_langs: {}
  shared_special_tokens: []
  aggregate_vocabulary: []
  tokenizer_langs_path: stt_meta_1b_tokenizer_langs.yaml
  shared_special_tokens_path: shared_special_tokens.yaml
  aggregate_vocabulary_path: aggregate_vocab.txt
  language_family_map:
    ENGLISH: ENGLISH
    INDO_ARYAN: INDO_ARYAN
training:
  lang_field: lang_family
  data_dir: /mnt/nfs/data/gujlish_v1/
  train_manifest: train.validated.json
  test_manifest: valid.validated.json
  batch_size: 16
  accumulate_grad_batches: 8
  max_duration: 16.0
  max_steps: 100000
  use_mixed_precision: true
  num_workers: 8
  pin_memory: true
  skip_audio_validation: true
  keyphrase_oversample_factor: 0.0
  use_family_loss_weights: true
  spec_augment:
    time_masks: 4
    time_width: 80
  optim:
    lr: 0.0001
    weight_decay: 0.0
    sched:
      warmup_steps: 3000
  devices:
  - 0
experiment:
  exp_dir: /mnt/nfs/experiments/
  exp_name: gujlish-meta-1b-v1
  monitor: val_wer
  mode: min
  always_save_nemo: true
  save_top_k: 3
  every_n_train_steps: 5000
