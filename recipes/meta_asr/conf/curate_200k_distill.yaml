sources:
  - manifest: /mnt/nfs/data/meta_stt_hi_set1/train.json
    lang_field: lang
  - manifest: /mnt/nfs/data/slavic_cv_full/train.json
    lang_field: lang
  - manifest: /mnt/nfs/data/meta_stt_zh_aishell3/train.json
    lang_field: lang

path_rewrites:
  - from: /mnt/training/data/
    to: /mnt/nfs/data/

filter:
  min_duration: 0.5
  max_duration: 20.0
  require_text: true
  normalize_tags: true

selection:
  method: k_center_greedy
  k: 200000
  min_per_lang: 20000
  teacher_model: /mnt/nfs/models/stt_meta_1b/parakeet-600m-encoder-tune-weight-0.5-batch-langfamily-balance-tokenizer-aggregated-new.nemo
  batch_size: 32
  embeddings_cache: /mnt/nfs/data/curated/embeddings_multilingual.npz

output:
  manifest: /mnt/nfs/data/curated/train_200k_curated.json
  work_dir: /mnt/nfs/data/curated/
  stats: true
