model:
  model_root: /mnt/nfs/models/parakeet-ctc-0.6b-zh/parakeet-ctc-riva-0-6b-unified-zh-cn_vtrainable_v3.0/
  model_name: Parakeet-Hybrid-XL-unified-0.6b_spe7k_zh-en-CN_3.0.nemo
  tokenizer_folder: tokenizer
  new_tokenizer_folder: zh_mega_tokenizer
  use_aggregate_tokenizer: true
  dynamic_tokenizer_params:
    type: bpe
    dir_prefix: tokenizer_
    non_special_tokens_per_lang: 3000
    non_special_tokens_per_lang_overrides: {}
    character_coverage: 0.995
    character_coverage_overrides: {}
    tokenizer_options: null
  special_token_prefixes:
  - ENTITY_
  - KEYWORD_
  - LANG_
  tokenizer_langs: {}
  shared_special_tokens: []
  aggregate_vocabulary: []
  language_families:
  - MANDARIN
  tokenizer_langs_path: mega_zh_v1_tokenizer_langs.yaml
  shared_special_tokens_path: mega_zh_v1_shared_special_tokens.yaml
  aggregate_vocabulary_path: mega_zh_v1_aggregate_vocab.txt
  language_family_map:
    MANDARIN: MANDARIN
adapter:
  enabled: true
  unfreeze_encoder: true
training:
  lang_field: lang
  data_dir: /mnt/nfs/data/mega_zh_annotated
  train_manifest: train.json
  test_manifest: valid.json
  batch_size: 4
  accumulate_grad_batches: 8
  max_duration: 20.0
  max_steps: 50000
  use_mixed_precision: true
  num_workers: 4
  pin_memory: true
  skip_audio_validation: true
  use_tag_classifier: true
  tag_classifier_weight: 5.0
  tag_classifier_hidden_dim: 256
  tag_classifier_dropout: 0.3
  tag_categories:
  - AGE
  - GENDER
  - EMOTION
  - INTENT
  keyphrase_oversample_factor: 3.0
  oversample_categories:
  - AGE
  - EMOTION
  - INTENT
  augmentation:
    enabled: true
    perturbations:
    - codec
    - ambient_scene
    - speed
  spec_augment:
    time_masks: 4
    time_width: 80
  optim:
    lr: 0.0003
    weight_decay: 0.001
    sched:
      name: CosineAnnealing
      warmup_steps: 500
      min_lr: 1.0e-06
      max_steps: 50000
  devices:
  - 0
experiment:
  exp_dir: /mnt/nfs/experiments/
  exp_name: mega-zh-v1-hybrid
  monitor: val_wer
  mode: min
  always_save_nemo: true
  save_top_k: 3
  every_n_train_steps: 1000
  resume_if_exists: true
  resume_past_end: false
