# =============================================================================
# Next-Gen Audio-Visual Meta-ASR Configuration
# =============================================================================
# Multi-head AV model with:
#   - SigLIP 2 So400m visual encoder (1152-dim, patch-level features)
#   - Cross-attention fusion (6 layers, 8 heads, 512-dim)
#   - Head 1: CTC decoder with inline + trailing tags
#   - Head 2: Scene classifier (scene_type, noise_level, num_speakers)
#   - Head 3: Speaker attribute classifier (TrailingTagClassifier)
#   - Head 4: Attention map export for video heat maps
# =============================================================================

sample_rate: 16000

# --- Base audio model ---
a_model_name: "BPE:stt_en_conformer_ctc_large"

# --- Modality flags ---
use_video_modality: true
use_pretrained_dec: false
labelled_manifest: true

# --- Model class ---
model_class: "promptingnemo.models.av_meta_ctc_model.AVMetaCTCModelBPE"

# =============================================================================
# Model configuration
# =============================================================================
model:
  model_root: /mnt/nfs/models/
  model_name: stt_en_conformer_ctc_large.nemo
  pretrained_model_path: /mnt/nfs/models/stt_en_conformer_ctc_large.nemo

  use_video_modality: true
  freeze_encoder: true
  use_adapters: true
  adapter_dim: 64

  # --- Fusion type ---
  fusion_type: "cross_attention"
  fusion_d_model: 512
  fusion_nhead: 8
  fusion_num_layers: 6
  fusion_dropout: 0.1

  # --- Visual encoder (SigLIP 2 So400m) ---
  video_feat_dim: 1152
  v_model:
    name: "google/siglip2-so400m-patch14-384"
    feat_dim: 1152
    use_patch_tokens: true
    patch_grid: 27
    freeze: true

  # --- Scene classifier (Head 2) ---
  scene_classifier:
    scene_type: 5       # indoor, outdoor, studio, meeting, presentation
    noise_level: 3      # clean, mild, heavy
    num_speakers: 3     # 1, 2, multi
  scene_classifier_weight: 0.3

  # --- Attention regularization (Head 4) ---
  attention_entropy_weight: 0.01

  # --- Tokenizer ---
  tokenizer_folder: tokenizer
  new_tokenizer_folder: av_meta_tokenizer_4k
  use_aggregate_tokenizer: false
  vocab_size: 4096
  character_coverage: 1.0

  # Special token prefixes (trailing tags)
  special_token_prefixes:
    - ENTITY_
    - INTENT_
    - EMOTION_
    - GENDER_
    - AGE_
    - VISUAL_
    - SCENE_
    - NOISE_

  # Inline event tokens (added to tokenizer vocabulary)
  additional_tokens:
    - "<LAUGH>"
    - "<COUGH>"
    - "<MUSIC>"
    - "<APPLAUSE>"
    - "<SILENCE>"
    - "<NOISE:traffic>"
    - "<NOISE:crowd>"
    - "<NOISE:typing>"
    - "<NOISE:other>"
    - "<NOD>"
    - "<SHAKE>"
    - "<GESTURE>"
    - "<SMILE>"
    - "<FROWN>"
    - "<GAZE_AWAY>"
    - "<LEAN_IN>"
    - "<LEAN_BACK>"
    - "<SPK:1>"
    - "<SPK:2>"
    - "<SPK:3>"
    - "<SPK:OVERLAP>"
    - "<EMPH>"
    - "</EMPH>"

# =============================================================================
# Training
# =============================================================================
training:
  data_dir: /mnt/nfs/data/speakervid_5m/
  train_manifest: manifests/train_manifest.json
  test_manifest: manifests/val_manifest.json

  batch_size: 48
  accumulate_grad_batches: 2     # effective batch = 96
  max_duration: 20.0
  max_steps: 200000
  use_mixed_precision: true
  num_workers: 8
  pin_memory: true
  skip_audio_validation: false

  # Video feature settings
  video_frame_rate: 5
  get_vid_feats: true
  get_zero_vid_feats: false

  # Tag classifier (Head 3)
  use_tag_classifier: true
  tag_classifier_weight: 0.5
  tag_categories:
    - AGE
    - GENDER
    - EMOTION
    - INTENT
    - VISUAL_TALKING
    - VISUAL_FACING
    - VISUAL_BODY
    - VISUAL_ACTIVITY
    - VISUAL_EXPRESSION
    - VISUAL_MOVEMENT
    - VISUAL_SPEAKERS
    - SCENE_TYPE
    - NOISE_LEVEL

  # Spec augmentation
  spec_augment:
    time_masks: 10
    time_width: 0.05
    freq_masks: 2
    freq_width: 27

  # Optimizer
  optim:
    name: adamw
    lr: 0.001
    betas: [0.9, 0.98]
    weight_decay: 1.0e-6
    sched:
      name: NoamAnnealing
      d_model: 512
      warmup_steps: 5000
      min_lr: 1.0e-6

  devices: [0]

# =============================================================================
# Audio encoder
# =============================================================================
encoder:
  _target_: nemo.collections.asr.modules.conformer_encoder.ConformerEncoder
  feat_in: 80
  feat_out: -1
  n_layers: 18
  d_model: 512
  subsampling: dw_striding
  subsampling_factor: 4
  subsampling_conv_channels: 512
  ff_expansion_factor: 4
  self_attention_model: rel_pos
  n_heads: 8
  conv_kernel_size: 31
  dropout: 0.1
  dropout_pre_encoder: 0.1
  dropout_emb: 0.0

# =============================================================================
# CTC Decoder
# =============================================================================
decoder:
  _target_: nemo.collections.asr.modules.conv_asr.ConvASRDecoder
  feat_in: 512
  num_classes: -1
  vocabulary: []

# =============================================================================
# Trainer
# =============================================================================
trainer:
  devices: 1
  accelerator: gpu
  max_steps: 200000
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  val_check_interval: 5000
  log_every_n_steps: 50
  precision: "16-mixed"

# =============================================================================
# Experiment
# =============================================================================
experiment:
  exp_dir: /mnt/nfs/experiments/
  exp_name: av-meta-nextgen-v1
  monitor: val_wer
  mode: min
  always_save_nemo: true
  save_top_k: 3
  every_n_train_steps: 5000
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
