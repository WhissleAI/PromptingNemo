apiVersion: batch/v1
kind: Job
metadata:
  name: av-meta-download
  namespace: dataprep
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
      - name: downloader
        image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
        command: ["bash", "-c"]
        args:
        - |
          set -e
          export PYTHONPATH=/mnt/nfs/code/PromptingNemo:$PYTHONPATH

          pip install -q huggingface_hub yt-dlp

          cd /mnt/nfs/code/PromptingNemo/recipes/av_meta_asr

          echo "=== Stage 1: Download annotations ==="
          python3 -u local/download_annotations.py \
            --output-dir /mnt/nfs/data/speakervid_5m/annotations

          echo "=== Stage 2: Download videos ==="
          python3 -u local/download_videos.py \
            --annotations-dir /mnt/nfs/data/speakervid_5m/annotations \
            --output-dir /mnt/nfs/data/speakervid_5m/videos \
            --workers 16

          echo "=== Download complete ==="
        resources:
          requests:
            cpu: "16"
            memory: "32Gi"
          limits:
            cpu: "32"
            memory: "64Gi"
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/nfs
      restartPolicy: OnFailure
      volumes:
      - name: nfs-volume
        persistentVolumeClaim:
          claimName: nfs-training-pvc
