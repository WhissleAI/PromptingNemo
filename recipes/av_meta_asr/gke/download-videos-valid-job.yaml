apiVersion: batch/v1
kind: Job
metadata:
  name: av-meta-download-videos-valid
  namespace: dataprep
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 259200
  template:
    spec:
      containers:
      - name: downloader
        image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
        command: ["bash", "-c"]
        args:
        - |
          set -e
          export PYTHONPATH=/mnt/nfs/code/PromptingNemo:$PYTHONPATH

          echo "=== Installing deno (needed for yt-dlp JS challenge) ==="
          conda install -y -c conda-forge unzip 2>/dev/null
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="/root/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          deno --version | head -1

          echo "=== Updating yt-dlp to latest ==="
          pip install -q --upgrade "yt-dlp[default]"
          yt-dlp --version

          cd /mnt/nfs/code/PromptingNemo/recipes/av_meta_asr

          echo "=== Downloading 3K videos with merged_anno coverage ==="
          echo "Filtering to video IDs >= 23e9pbVQ_lo (merged_anno range)"
          python3 -u local/download_videos.py \
            --annotations-dir /mnt/nfs/data/speakervid_5m/annotations \
            --output-dir /mnt/nfs/data/speakervid_5m/videos_valid \
            --workers 2 \
            --limit 3000 \
            --min-video-id "23e9pbVQ_lo"

          echo "=== Video download complete ==="
          echo "Videos downloaded:" && ls /mnt/nfs/data/speakervid_5m/videos_valid/*.mp4 2>/dev/null | wc -l
          du -sh /mnt/nfs/data/speakervid_5m/videos_valid/
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/nfs
      restartPolicy: OnFailure
      volumes:
      - name: nfs-volume
        persistentVolumeClaim:
          claimName: nfs-training-pvc
