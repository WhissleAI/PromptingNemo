apiVersion: batch/v1
kind: Job
metadata:
  name: av-meta-train-v1
  namespace: dataprep
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
      - name: trainer
        image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
        command: ["bash", "-c"]
        args:
        - |
          set -e
          export PYTHONPATH=/mnt/nfs/code/PromptingNemo:$PYTHONPATH
          export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

          pip install -q transformers

          cd /mnt/nfs/code/PromptingNemo

          python3 -u -m promptingnemo.training.cli \
            --config recipes/av_meta_asr/conf/av_meta_nextgen.yaml \
            --mode train
        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: 1
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/nfs
        - name: dshm
          mountPath: /dev/shm
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-a100
      restartPolicy: OnFailure
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      volumes:
      - name: nfs-volume
        persistentVolumeClaim:
          claimName: nfs-training-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
