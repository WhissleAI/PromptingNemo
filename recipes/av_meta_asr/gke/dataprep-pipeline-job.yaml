apiVersion: batch/v1
kind: Job
metadata:
  name: av-meta-dataprep-pipeline
  namespace: dataprep
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 172800
  template:
    spec:
      containers:
      - name: dataprep
        image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
        command: ["bash", "-c"]
        args:
        - |
          set -e
          export PYTHONPATH=/mnt/nfs/code/PromptingNemo:$PYTHONPATH

          pip install -q transformers av Pillow

          cd /mnt/nfs/code/PromptingNemo/recipes/av_meta_asr

          VIDEOS_DIR=/mnt/nfs/data/speakervid_5m/videos_valid
          ANNO_DIR=/mnt/nfs/data/speakervid_5m/annotations
          DATA_DIR=/mnt/nfs/data/speakervid_5m

          echo "=== Pre-flight check ==="
          echo "Videos:" && ls $VIDEOS_DIR/*.mp4 2>/dev/null | wc -l
          echo "Merged annotations:" && ls $ANNO_DIR/merged_anno/ 2>/dev/null | head -3

          echo "=== Stage 1: Extract clips ==="
          python3 -u local/extract_clips.py \
            --annotations-dir $ANNO_DIR \
            --videos-dir $VIDEOS_DIR \
            --output-dir $DATA_DIR/clips \
            --workers 8

          echo "Clips extracted:"
          ls $DATA_DIR/clips/*.mp4 2>/dev/null | wc -l

          echo "=== Stage 2: Extract audio ==="
          python3 -u local/extract_audio.py \
            --clips-dir $DATA_DIR/clips \
            --output-dir $DATA_DIR/audio \
            --workers 8

          echo "Audio files:"
          ls $DATA_DIR/audio/*.wav 2>/dev/null | wc -l

          echo "=== Stage 3: Extract SigLIP 2 features (CLS-only for test) ==="
          python3 -u local/extract_clip_features.py \
            --clips-dir $DATA_DIR/clips \
            --output-dir $DATA_DIR/siglip_features \
            --model-name google/siglip2-so400m-patch14-384 \
            --fps 5 \
            --batch-size 32 \
            --cls-only \
            --overwrite

          echo "Feature files:"
          ls $DATA_DIR/siglip_features/*.npz 2>/dev/null | wc -l

          echo "=== Stage 4: Parse annotations ==="
          python3 -u local/parse_annotations.py \
            --annotations-dir $ANNO_DIR \
            --output $DATA_DIR/metadata/parsed_annotations.jsonl \
            --workers 8

          echo "=== Stage 5: Build manifests ==="
          python3 -u local/build_manifest.py \
            --annotations $DATA_DIR/metadata/parsed_annotations.jsonl \
            --audio-dir $DATA_DIR/audio \
            --clips-dir $DATA_DIR/clips \
            --features-dir $DATA_DIR/siglip_features \
            --output-dir $DATA_DIR/manifests

          echo "=== Storage report ==="
          du -sh $DATA_DIR/*/
          echo "=== Manifest stats ==="
          cat $DATA_DIR/manifests/manifest_stats.json 2>/dev/null || echo "no stats file"
          echo ""
          wc -l $DATA_DIR/manifests/*.json 2>/dev/null || echo "no manifests yet"
          echo "=== ALL STAGES COMPLETE ==="
        resources:
          requests:
            cpu: "4"
            memory: "24Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: "10"
            memory: "80Gi"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/nfs
        - name: dshm
          mountPath: /dev/shm
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-a100
      restartPolicy: OnFailure
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule
      volumes:
      - name: nfs-volume
        persistentVolumeClaim:
          claimName: nfs-training-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
