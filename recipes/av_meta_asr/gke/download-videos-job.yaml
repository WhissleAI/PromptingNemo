apiVersion: batch/v1
kind: Job
metadata:
  name: av-meta-download-videos-100k
  namespace: dataprep
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 259200  # 3 days max
  template:
    spec:
      containers:
      - name: downloader
        image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
        command: ["bash", "-c"]
        args:
        - |
          set -e
          export PYTHONPATH=/mnt/nfs/code/PromptingNemo:$PYTHONPATH
          pip install -q yt-dlp

          cd /mnt/nfs/code/PromptingNemo/recipes/av_meta_asr

          echo "=== Downloading YouTube videos (100K limit) ==="
          python3 -u local/download_videos.py \
            --annotations-dir /mnt/nfs/data/speakervid_5m/annotations \
            --output-dir /mnt/nfs/data/speakervid_5m/videos \
            --workers 16 \
            --limit 100000

          echo "=== Video download complete ==="
          echo "Videos downloaded:" && ls /mnt/nfs/data/speakervid_5m/videos/*.mp4 2>/dev/null | wc -l
          du -sh /mnt/nfs/data/speakervid_5m/videos/
        resources:
          requests:
            cpu: "16"
            memory: "16Gi"
          limits:
            cpu: "32"
            memory: "32Gi"
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/nfs
      restartPolicy: OnFailure
      volumes:
      - name: nfs-volume
        persistentVolumeClaim:
          claimName: nfs-training-pvc
