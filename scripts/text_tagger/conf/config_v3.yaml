data:
  data_dir: /mnt/nfs/data/text_tagger
  train_manifest: merged_train.json
  val_manifest: merged_valid.json

tokenizer:
  tokenizers_dir: /mnt/nfs/models/stt_meta_1b/stt_meta_1b_tokenizers
  aggregate_vocab_path: /mnt/nfs/models/stt_meta_1b/aggregate_vocab.txt
  default_family: ENGLISH

model:
  encoder_name: xlm-roberta-base
  hidden_dim: 512
  upsample_factor: 5
  max_input_length: 128
  freeze_encoder: true
  unfreeze_top_n: 2
  chunk_size: 8
  chunk_jitter: 3

training:
  batch_size: 48
  accumulate_grad_batches: 4
  lr: 0.0005
  weight_decay: 0.01
  warmup_steps: 2000
  max_steps: 200000
  gradient_clip_val: 1.0
  val_check_interval: 5000
  save_every_n_steps: 5000
  log_every_n_steps: 100
  num_workers: 4
  devices: 1
  precision: 16-mixed

experiment:
  exp_dir: /mnt/nfs/experiments
  exp_name: text_ctc_tagger_v3_xlmr
