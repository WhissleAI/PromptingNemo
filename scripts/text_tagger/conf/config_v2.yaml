data:
  data_dir: /mnt/nfs/data/text_tagger
  train_manifest: merged_train.json
  val_manifest: merged_valid.json

tokenizer:
  tokenizers_dir: /mnt/nfs/models/stt_meta_1b/stt_meta_1b_tokenizers
  aggregate_vocab_path: /mnt/nfs/models/stt_meta_1b/aggregate_vocab.txt
  default_family: ENGLISH

model:
  hidden_dim: 256
  num_heads: 4
  num_layers: 8
  ffn_dim: 1024
  conv_kernel_size: 31
  dropout: 0.1
  upsample_factor: 3
  max_input_length: 256
  causal: true

training:
  batch_size: 32
  accumulate_grad_batches: 8
  lr: 0.001
  weight_decay: 0.01
  warmup_steps: 5000
  max_steps: 500000
  gradient_clip_val: 1.0
  val_check_interval: 5000
  save_every_n_steps: 5000
  log_every_n_steps: 100
  num_workers: 8
  devices: 1
  precision: 16-mixed

experiment:
  exp_dir: /mnt/nfs/experiments
  exp_name: text_ctc_tagger_v2_conformer
