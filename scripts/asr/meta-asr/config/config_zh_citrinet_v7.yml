model:
  model_root: /mnt/nfs/models/zh_citrinet_ctc/
  model_name: stt_zh_citrinet_1024_gamma_0_25.nemo
  tokenizer_folder: tokenizer
  new_tokenizer_folder: zh_meta_tokenizer
  use_aggregate_tokenizer: false
  tokenizer_langs:
    MANDARIN:
      dir: /mnt/nfs/models/zh_citrinet_ctc/zh_meta_tokenizer
      type: bpe
  special_token_prefixes:
  - ENTITY_
  - INTENT_
  - EMOTION_
  - GENDER_
  - AGE_
  - DIALECT_
  - KEYWORD_
  - LANG_
  - OTHER_
  language_families:
  - MANDARIN
adapter:
  enabled: true
  name: lang_adapter
  dim: 256
  activation: swish
  norm_position: pre
  unfreeze_decoder: true
training:
  data_dir: /mnt/nfs/data/meta_stt_zh_aishell3
  train_manifest: train.json
  test_manifest: test.json
  batch_size: 16
  accumulate_grad_batches: 2
  max_duration: 16.0
  max_steps: 50000
  use_mixed_precision: true
  num_workers: 4
  pin_memory: true
  use_keyword_loss: false
  use_family_loss_weights: false
  spec_augment:
    time_masks: 4
    time_width: 80
  optim:
    lr: 0.001
    weight_decay: 0.0
    sched:
      warmup_steps: 1000
      min_lr: 1.0e-06
      max_steps: 50000
  devices: 1
  tag_decoder_scale: 0.01
  tag_init_bias: -5.0
experiment:
  exp_dir: /mnt/nfs/experiments/
  exp_name: zh-citrinet-meta-v7
  monitor: val_wer
  mode: min
  always_save_nemo: true
  save_top_k: 3
  every_n_train_steps: 2000
tag_classifier:
  enabled: true
  weight: 0.1
  categories:
  - AGE
  - GENDER
  - DIALECT
