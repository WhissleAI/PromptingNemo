model:
  model_root: /mnt/training/models/stt_meta_1b/
  model_name: parakeet-600m-encoder-tune-weight-0.5-batch-langfamily-balance-tokenizer-aggregated-new.nemo
  tokenizer_folder: tokenizer
  new_tokenizer_folder: tokenizer_english
  use_aggregate_tokenizer: true
  dynamic_tokenizer_params:
    type: bpe
    dir_prefix: tokenizer_
    non_special_tokens_per_lang: 1024
    non_special_tokens_per_lang_overrides: {}
    character_coverage: 0.9995
    character_coverage_overrides: {}
    tokenizer_options: null
  special_token_prefixes:
  - ENTITY_
  - INTENT_
  - EMOTION_
  - GENDER_
  - AGE_
  - KEYWORD_
  - LANG_
  - ROLE_
  - DOMAIN_
  - AUDIO_EVENT_
  tokenizer_langs: {}
  shared_special_tokens: []
  aggregate_vocabulary: []
  language_families:
  - ENGLISH
  tokenizer_langs_path: tokenizer_langs.yaml
  shared_special_tokens_path: shared_special_tokens.yaml
  aggregate_vocabulary_path: aggregate_vocab.txt
  language_family_map:
    ENGLISH: ENGLISH
adapter:
  enabled: true
  name: betrac_medical_adapter
  dim: 128
  activation: swish
  norm_position: pre
  unfreeze_decoder: true
tag_classifier:
  enabled: true
  heads:
  - name: age
    prefix: AGE_
    classes: [AGE_0_18, AGE_18_30, AGE_30_45, AGE_45_60, AGE_60PLUS]
    loss_weight: 1.0
  - name: gender
    prefix: GENDER_
    classes: [GENDER_MALE, GENDER_FEMALE, GENDER_OTHER]
    loss_weight: 1.0
  - name: emotion
    prefix: EMOTION_
    classes: [EMOTION_ANGRY, EMOTION_DISGUST, EMOTION_FEAR, EMOTION_HAPPY, EMOTION_NEUTRAL, EMOTION_SAD, EMOTION_SURPRISE]
    loss_weight: 1.0
  - name: domain
    prefix: DOMAIN_
    classes: [DOMAIN_MEDICAL, DOMAIN_GENERAL, DOMAIN_TELECOM, DOMAIN_TECH]
    loss_weight: 0.5
  hidden_dim: 256
  dropout: 0.1
  warmup_steps: 500
training:
  lang_field: lang
  data_dir: /mnt/training/data/betrac_en_medical
  train_manifest: train.json
  test_manifest: valid.json
  batch_size: 16
  accumulate_grad_batches: 4
  max_duration: 16.0
  max_steps: 100000
  use_mixed_precision: true
  num_workers: 4
  pin_memory: true
  keyword_loss_weight: 0.5
  use_keyword_loss: true
  keyword_loss_warmup_steps: 500
  use_family_loss_weights: false
  spec_augment:
    time_masks: 4
    time_width: 80
  optim:
    lr: 0.0005
    weight_decay: 0.0
    sched:
      warmup_steps: 1000
  validation_workers: null
  skip_audio_validation: true
  keyphrase_oversample_factor: 0.0
  devices: 1
experiment:
  exp_dir: /mnt/training/experiments/
  exp_name: betrac-en-medical-meta1b-adapter-v1
  monitor: val_wer
  mode: min
  always_save_nemo: true
  save_top_k: 3
  every_n_train_steps: 5000
