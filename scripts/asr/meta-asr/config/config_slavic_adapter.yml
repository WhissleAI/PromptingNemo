model:
  model_root: /mnt/training/models/stt_meta_1b/
  model_name: parakeet-600m-encoder-tune-weight-0.5-batch-langfamily-balance-tokenizer-aggregated-new.nemo
  tokenizer_folder: tokenizer
  new_tokenizer_folder: slavic_meta_tokenizer
  use_aggregate_tokenizer: true
  dynamic_tokenizer_params:
    type: bpe
    dir_prefix: tokenizer_
    non_special_tokens_per_lang: 3000
    non_special_tokens_per_lang_overrides: {}
    character_coverage: 0.995
    character_coverage_overrides: {}
    tokenizer_options: null
  special_token_prefixes:
  - ENTITY_
  - INTENT_
  - EMOTION_
  - GENDER_
  - AGE_
  - KEYWORD_
  - LANG_
  tokenizer_langs: {}
  shared_special_tokens: []
  aggregate_vocabulary: []
  language_families:
  - SLAVIC
  tokenizer_langs_path: tokenizer_langs.yaml
  shared_special_tokens_path: shared_special_tokens.yaml
  aggregate_vocabulary_path: aggregate_vocab.txt
  language_family_map: {}
adapter:
  enabled: true
  name: slavic_adapter
  dim: 128
  activation: swish
  norm_position: pre
  unfreeze_decoder: true
training:
  lang_field: lang
  data_dir: /mnt/training/data/slavic_cv_full
  train_manifest: train.json
  test_manifest: valid.json
  batch_size: 48
  accumulate_grad_batches: 2
  max_duration: 16.0
  max_steps: 340000
  use_mixed_precision: true
  num_workers: 4
  pin_memory: true
  keyword_loss_weight: 0.5
  use_keyword_loss: true
  keyword_loss_warmup_steps: 500
  use_family_loss_weights: false
  spec_augment:
    time_masks: 4
    time_width: 80
  optim:
    lr: 0.001
    weight_decay: 0.0
    sched:
      warmup_steps: 500
  validation_workers: null
  skip_audio_validation: true
  keyphrase_oversample_factor: 0.0
  devices: 1
experiment:
  exp_dir: /mnt/training/experiments/
  exp_name: slavic-cv-meta1b-adapter
  monitor: val_wer
  mode: min
  always_save_nemo: true
  save_top_k: 3
  every_n_train_steps: 5000
