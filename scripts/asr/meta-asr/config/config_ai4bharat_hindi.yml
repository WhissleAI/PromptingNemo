model:
  model_root: "/external1/pretrained_models/stt_hi_conformer_ctc_large/"
  model_name: "stt_hi_conformer_ctc_large.nemo"
  tokenizer_folder: "tokenizer"
  new_tokenizer_folder: "hindi_meta_tokenizer"
  proto_file: "proto/file"
  proto_dir: "proto/dir"

training:
  data_dir: "/external4/datasets/AI4Bharat/hindi"
  train_manifest: "nemo_train.jsonl"
  test_manifest: "nemo_valid.jsonl"
  batch_size: 16
  accumulate_grad_batches: 4
  max_steps: 100000
  max_duration: 20.0
  num_workers: 4
  pin_memory: true
  use_mixed_precision: true
  use_keyword_loss: false
  use_family_loss_weights: false
  skip_audio_validation: false
  devices: 1
  optim:
    lr: 0.0001
    weight_decay: 0.0
    sched:
      warmup_steps: 10000

adapters:
  LinearAdapter:
    name: "LinearAdapter"
    dim: 32
    activation: "relu"
    norm_position: "pre"
  BottleneckAdapter:
    name: "BottleneckAdapter"
    dim: 64
    activation: "gelu"
    norm_position: "post"
  AttentionAdapter:
    name: "AttentionAdapter"
    dim: 48
    activation: "swish"
    norm_position: "pre"

experiment:
  exp_dir: "/external1/experiments/"
  exp_name: "hi-ai4bharat-adaptater-encoder-freeze"
  monitor: "val_wer"
  mode: "min"
  always_save_nemo: true
  save_best_model: true
  save_top_k: 3
  every_n_train_steps: 2000
  resume_if_exists: true
  resume_from_checkpoint: "last"
