# --- Job 5a: Annotate IndicVoices Gujarati ---
apiVersion: batch/v1
kind: Job
metadata:
  name: dataprep-annotate-gu-indicvoices
  namespace: dataprep
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 259200
  template:
    metadata:
      labels:
        app: dataprep
        dataset: annotate-gu-indicvoices
        lang: gujarati
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      initContainers:
        - name: wait-for-download
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for IndicVoices download to finish..."
              while [ ! -f /mnt/nfs/data/gujarati_v1/raw/indicvoices/train.json ]; do
                sleep 30
              done
              echo "Download complete, starting annotation."
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: annotator
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              python /app/scripts/annotate_indic_meta.py \
                --manifest /mnt/nfs/data/gujarati_v1/raw/indicvoices/train.json \
                --output /mnt/nfs/data/gujarati_v1/raw/indicvoices/train_nemo.jsonl \
                --lang gujarati --batch-size 10 &&
              python /app/scripts/annotate_indic_meta.py \
                --manifest /mnt/nfs/data/gujarati_v1/raw/indicvoices/valid.json \
                --output /mnt/nfs/data/gujarati_v1/raw/indicvoices/valid_nemo.jsonl \
                --lang gujarati --batch-size 10
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-key
                  key: key
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 32Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
---
