# ============================================================================
# Gujarati ASR Data Pipeline — GKE Jobs
# Jobs 1-4: Download (parallel)
# Jobs 5a-5c: Annotation (parallel, wait for respective download)
# Job 6: Merge & validate (waits for all annotation jobs)
# ============================================================================

# --- Job 1: IndicVoices Gujarati (raw parquet → WAV + manifest) ---
apiVersion: batch/v1
kind: Job
metadata:
  name: dataprep-indicvoices-gu
  namespace: dataprep
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 172800
  template:
    metadata:
      labels:
        app: dataprep
        dataset: indicvoices-gu
        lang: gujarati
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      containers:
        - name: downloader
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          args:
            - /app/scripts/download_indicvoices_raw.py
            - --dataset=ai4bharat/IndicVoices
            - --lang=gujarati
            - --output-dir=/mnt/nfs/data/gujarati_v1/raw/indicvoices
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 32Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
---
