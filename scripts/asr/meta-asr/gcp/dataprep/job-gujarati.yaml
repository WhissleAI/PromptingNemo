# --- Job 6: Merge all annotated manifests + validate ---
apiVersion: batch/v1
kind: Job
metadata:
  name: dataprep-merge-gu
  namespace: dataprep
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 86400
  template:
    metadata:
      labels:
        app: dataprep
        dataset: merge-gu
        lang: gujarati
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      initContainers:
        - name: wait-for-annotations
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for all annotation jobs to finish..."
              for f in \
                /mnt/nfs/data/gujarati_v1/raw/indicvoices/train_nemo.jsonl \
                /mnt/nfs/data/gujarati_v1/raw/indicvoices_r/train_nemo.jsonl \
                /mnt/nfs/data/gujarati_v1/raw/kathbath/train_nemo.jsonl; do
                echo "  Waiting for $f ..."
                while [ ! -f "$f" ]; do sleep 60; done
                echo "  Found $f"
              done
              echo "All annotation outputs ready."
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: merger
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              python /app/scripts/merge_gujarati_manifests.py \
                --data-root /mnt/nfs/data/gujarati_v1/raw \
                --output-dir /mnt/nfs/data/gujarati_v1 &&
              echo "Merge complete. Final manifests:" &&
              wc -l /mnt/nfs/data/gujarati_v1/train.json /mnt/nfs/data/gujarati_v1/valid.json
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
