apiVersion: batch/v1
kind: Job
metadata:
  name: dataprep-merge-en
  namespace: dataprep
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels:
        app: dataprep
        dataset: merge-en
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      initContainers:
        - name: wait-for-annotations
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "Waiting for all English annotation jobs to complete..."
              # en_people is pre-tagged, just check it exists
              while [ ! -f /mnt/nfs/data/multilingual_v1/raw/en_people/train.json ]; do
                echo "  en_people not ready. Sleeping 60s..."
                sleep 60
              done
              echo "  en_people: ready"
              # Check CV English annotation
              while [ ! -f /mnt/nfs/data/multilingual_v1/raw/commonvoice_17/english/train.json ]; do
                echo "  cv_english not ready. Sleeping 60s..."
                sleep 60
              done
              echo "  cv_english: ready"
              # Check digits
              while [ ! -f /mnt/nfs/data/english_v1/raw/digits/speech_commands/train.json ]; do
                echo "  speech_commands not ready. Sleeping 60s..."
                sleep 60
              done
              echo "  speech_commands: ready"
              echo "All sources ready. Starting merge."
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: merger
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          args:
            - /app/scripts/merge_english_manifests.py
            - --data-root=/mnt/nfs/data
            - --output-dir=/mnt/nfs/data/english_v1
            - --digit-oversample=3
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
