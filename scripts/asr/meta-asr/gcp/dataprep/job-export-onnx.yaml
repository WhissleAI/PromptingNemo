apiVersion: batch/v1
kind: Job
metadata:
  name: export-en-in-tech-misc-onnx
  namespace: dataprep
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: export
        model: en-in-tech-misc
    spec:
      restartPolicy: Never
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: exporter
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "=== ONNX Dual-Head Export Pipeline ==="
              export PYTHONPATH="/mnt/nfs/code/PromptingNemo:$PYTHONPATH"
              pip install --quiet onnx onnxruntime google-cloud-storage 2>&1 | tail -2
              pip install --quiet google-cloud-storage 2>&1 | tail -1

              # --- Locate best .nemo and .ckpt ---
              EXP_DIR=/mnt/nfs/experiments/en-in-tech-misc-v4
              echo "Looking for checkpoints in: $EXP_DIR"

              NEMO_FILE=$(find $EXP_DIR -name "*.nemo" -type f | sort -t/ -k1 | tail -1)
              BEST_CKPT=$(find $EXP_DIR -name "*.ckpt" -type f | sort -t/ -k1 | tail -1)

              if [ -z "$NEMO_FILE" ]; then
                echo "ERROR: No .nemo file found in $EXP_DIR"
                exit 1
              fi
              echo "  .nemo: $NEMO_FILE"
              echo "  .ckpt: $BEST_CKPT"
              ls -lh "$NEMO_FILE" "$BEST_CKPT"

              # --- Export ---
              OUTPUT_DIR=/mnt/nfs/exports/en-in-tech-misc-onnx
              rm -rf $OUTPUT_DIR
              mkdir -p $OUTPUT_DIR

              cd /mnt/nfs/code/decoder_onnx
              python -m src.export_dual_head \
                --nemo_model "$NEMO_FILE" \
                --checkpoint "$BEST_CKPT" \
                --label_map /mnt/nfs/code/PromptingNemo/recipes/meta_asr/conf/en_in_tech_misc_label_map.json \
                --output_dir $OUTPUT_DIR \
                --cpu

              echo ""
              echo "=== Exported files ==="
              ls -lh $OUTPUT_DIR/

              # --- Verify ONNX loads ---
              python -c "
              import onnxruntime as ort
              import json
              sess = ort.InferenceSession('$OUTPUT_DIR/model.onnx', providers=['CPUExecutionProvider'])
              print(f'model.onnx: {len(sess.get_inputs())} inputs, {len(sess.get_outputs())} outputs')
              for o in sess.get_outputs():
                  print(f'  output: {o.name} {o.shape}')
              cls = ort.InferenceSession('$OUTPUT_DIR/tag_classifier.onnx', providers=['CPUExecutionProvider'])
              print(f'tag_classifier.onnx: {len(cls.get_inputs())} inputs, {len(cls.get_outputs())} outputs')
              for i in cls.get_inputs():
                  print(f'  input: {i.name} {i.shape}')
              for o in cls.get_outputs():
                  print(f'  output: {o.name} {o.shape}')
              with open('$OUTPUT_DIR/tag_classifier.json') as f:
                  meta = json.load(f)
              print(f'input_type: {meta.get(\"input_type\")}')
              print(f'categories: {list(meta.get(\"categories\", {}).keys())}')
              "

              # --- Upload to GCS ---
              echo ""
              echo "=== Uploading to GCS ==="
              python3 -c "
              from google.cloud import storage
              import os, glob
              client = storage.Client()
              bucket = client.bucket('whissle-voice-recordings')
              prefix = 'asr-models/model-en-in-tech-misc'
              for fpath in glob.glob('$OUTPUT_DIR/*'):
                  fname = os.path.basename(fpath)
                  blob = bucket.blob(f'{prefix}/{fname}')
                  blob.upload_from_filename(fpath)
                  print(f'  Uploaded {fname} ({os.path.getsize(fpath) / 1024 / 1024:.1f} MB)')
              print(f'All files uploaded to gs://whissle-voice-recordings/{prefix}/')
              "

              echo ""
              echo "=== Export complete ==="
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 32Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
