apiVersion: batch/v1
kind: Job
metadata:
  name: train-en-in-tech-misc-v10
  namespace: dataprep
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 604800
  template:
    metadata:
      labels:
        app: training
        model: en-in-tech-misc
    spec:
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-nodepool: a100-pool
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: wait-for-misc-data
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "Waiting for split MISC-annotated training data..."
              while [ ! -f /mnt/nfs/data/en_in_tech_interviews/train_misc.json ]; do
                echo "  train_misc.json not ready. Sleeping 60s..."
                sleep 60
              done
              while [ ! -f /mnt/nfs/data/en_in_tech_interviews/valid_misc.json ]; do
                echo "  valid_misc.json not ready. Sleeping 60s..."
                sleep 60
              done
              train_count=$(wc -l < /mnt/nfs/data/en_in_tech_interviews/train_misc.json)
              valid_count=$(wc -l < /mnt/nfs/data/en_in_tech_interviews/valid_misc.json)
              echo "MISC data ready: train=$train_count, valid=$valid_count"

              echo "=== Verify BEHAVIOR/EVAL tags present ==="
              head -1 /mnt/nfs/data/en_in_tech_interviews/train_misc.json | python3 -c "
              import json, sys
              d = json.loads(sys.stdin.readline())
              text = d['text']
              has_behavior = 'BEHAVIOR_' in text
              has_eval = 'EVAL_' in text
              has_role = 'ROLE_' in text
              print(f'Tags present: BEHAVIOR={has_behavior}, EVAL={has_eval}, ROLE={has_role}')
              if not has_behavior:
                  print('ERROR: BEHAVIOR_ tags missing!')
                  sys.exit(1)
              "

              # Verify no SPEAKER_CHANGE tokens remain
              sc_count=$(grep -c 'SPEAKER_CHANGE' /mnt/nfs/data/en_in_tech_interviews/train_misc.json || true)
              echo "SPEAKER_CHANGE tokens remaining: $sc_count (should be 0)"
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: trainer
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "=== Setting up PromptingNemo ==="
              export PYTHONPATH="/mnt/nfs/code/PromptingNemo:$PYTHONPATH"
              pip install --quiet num2words 2>&1 | tail -2

              echo "=== Verifying GPU ==="
              python -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}, devices: {torch.cuda.device_count()}')"
              nvidia-smi

              echo "=== Base model: en-meta-v2-400k (already fine-tuned with tags) ==="
              ls -lh /mnt/nfs/experiments/en-meta-v2-400k/2026-05-13_00-47-34/checkpoints/en-meta-v2-400k.nemo

              echo "=== Starting MISC training (BEHAVIOR + EVAL) on A100 ==="
              python -m promptingnemo.training.cli \
                --config /mnt/nfs/code/PromptingNemo/recipes/meta_asr/conf/english_en_in_tech_misc.yaml \
                --mode train

              echo "=== MISC Training complete ==="
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
          resources:
            requests:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "12"
              memory: 64Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
