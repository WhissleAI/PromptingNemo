apiVersion: batch/v1
kind: Job
metadata:
  name: train-en-in-tech
  namespace: dataprep
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 604800
  template:
    metadata:
      labels:
        app: training
        model: en-in-tech
    spec:
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-nodepool: gpu-pool
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: wait-for-data
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "Waiting for cleaned EN-IN Tech training data..."
              while [ ! -f /mnt/nfs/data/en_in_tech_interviews/train_dualhead.json ]; do
                echo "  Dualhead data not ready. Sleeping 60s..."
                sleep 60
              done
              train_count=$(wc -l < /mnt/nfs/data/en_in_tech_interviews/train_dualhead.json)
              valid_count=$(wc -l < /mnt/nfs/data/en_in_tech_interviews/valid_dualhead.json)
              echo "Data ready: train=$train_count, valid=$valid_count"
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
        - name: download-base-model
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
          command: ["bash", "-c"]
          args:
            - |
              if [ -f /mnt/nfs/models/stt_en_conformer_ctc_large.nemo ]; then
                echo "Base model already downloaded."
                exit 0
              fi
              echo "Downloading nvidia/stt_en_conformer_ctc_large..."
              mkdir -p /mnt/nfs/models
              python -c "
              from huggingface_hub import hf_hub_download
              path = hf_hub_download('nvidia/stt_en_conformer_ctc_large', filename='stt_en_conformer_ctc_large.nemo', local_dir='/mnt/nfs/models')
              print(f'Downloaded to {path}')
              "
              echo "Base model downloaded."
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: trainer
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/nemo-training:latest
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "=== Setting up PromptingNemo ==="
              export PYTHONPATH="/mnt/nfs/code/PromptingNemo:$PYTHONPATH"
              pip install --quiet num2words 2>&1 | tail -2

              echo "=== Verifying GPU ==="
              python -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}, devices: {torch.cuda.device_count()}')"

              echo "=== Starting training ==="
              python -m promptingnemo.training.cli \
                --config /mnt/nfs/code/PromptingNemo/recipes/meta_asr/conf/english_en_in_tech.yaml \
                --mode train

              echo "=== Training complete ==="
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
