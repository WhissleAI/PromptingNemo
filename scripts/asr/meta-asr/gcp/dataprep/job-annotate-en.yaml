---
# Annotate CommonVoice English with AGE/GENDER/EMOTION + Gemini INTENT/ENTITY
apiVersion: batch/v1
kind: Job
metadata:
  name: dataprep-annotate-en-cv
  namespace: dataprep
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 259200
  template:
    metadata:
      labels:
        app: dataprep
        dataset: annotate-en-cv
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      initContainers:
        - name: wait-for-cv-english
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "Waiting for CommonVoice English download..."
              while [ ! -f /mnt/nfs/data/multilingual_v1/raw/commonvoice_17/english/train.json ]; do
                echo "  Not ready yet. Sleeping 60s..."
                sleep 60
              done
              echo "CommonVoice English manifests found."
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: annotate-audio
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "=== Step 1: Audio tag annotation (AGE/GENDER/EMOTION) ==="
              python /app/scripts/annotate_audio_tags.py \
                --data-root /mnt/nfs/data/multilingual_v1/raw/commonvoice_17/english \
                --resume
              echo "=== Step 2: Gemini INTENT/ENTITY annotation ==="
              python /app/scripts/annotate_with_gemini.py \
                --data-root /mnt/nfs/data/multilingual_v1/raw/commonvoice_17/english
              echo "=== Annotation complete ==="
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-key
                  key: key
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 32Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
---
# Annotate digit datasets with EMOTION tags (lightweight)
apiVersion: batch/v1
kind: Job
metadata:
  name: dataprep-annotate-en-digits
  namespace: dataprep
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 86400
  template:
    metadata:
      labels:
        app: dataprep
        dataset: annotate-en-digits
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        cloud.google.com/gke-nodepool: dataprep-pool
      initContainers:
        - name: wait-for-digits
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "Waiting for digit datasets..."
              while [ ! -f /mnt/nfs/data/english_v1/raw/digits/speech_commands/train.json ]; do
                echo "  Not ready yet. Sleeping 60s..."
                sleep 60
              done
              echo "Digit manifests found."
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      containers:
        - name: annotate-audio
          image: us-central1-docker.pkg.dev/deepvoice-468015/cloud-run-source-deploy/dataprep:latest
          command: ["bash", "-c"]
          args:
            - |
              echo "=== Emotion tagging for digit datasets ==="
              python /app/scripts/annotate_audio_tags.py \
                --data-root /mnt/nfs/data/english_v1/raw/digits \
                --resume
              echo "=== Digit annotation complete ==="
          env:
            - name: HF_HOME
              value: /mnt/nfs/.cache/huggingface
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: nfs
              mountPath: /mnt/nfs
      volumes:
        - name: nfs
          persistentVolumeClaim:
            claimName: nfs-training-pvc
